<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>سجل السرطان - صبراتة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Tahoma, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin: 5px 0 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>إضافة بيانات مريض جديد</h2>
        <form id="patientForm">
            <label>رقم الملف</label><input type="text" id="file_number" required>
            <label>السنة</label><input type="number" id="year">
            <label>الاسم الثلاثي</label><input type="text" id="full_name">
            <label>المنطقة</label><input type="text" id="region">
            <label>كود المحلة</label><input type="text" id="locality_code">
            <label>العمر</label><input type="number" id="age">
            <label>تاريخ التشخيص</label><input type="date" id="diagnosis_date">
            <label>نوع الورم</label><input type="text" id="tumor_type">
            <label>مكان الورم</label><input type="text" id="tumor_site">
            <label>سلوك الورم</label><input type="text" id="tumor_behavior">
            <label>التشخيص</label><input type="text" id="diagnosis">
            <label>المتابعة</label><input type="text" id="follow_up">
            <button type="submit" id="saveBtn">حفظ البيانات في السجل</button>
        </form>
    </div>

    <script>
        // إعدادات الاتصال بقاعدة البيانات
        const supabaseUrl = 'https://syjmrfwcbflpgijahws.supabase.co';
        const supabaseKey = 'sb_publishable_ROZDYlof6ewGr-6y_9R_pQ_U8rptzVL';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('patientForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('saveBtn').innerText = "جاري الحفظ...";

            const { error } = await supabase.from('patients').insert([{
                file_number: document.getElementById('file_number').value,
                year: document.getElementById('year').value,
                full_name: document.getElementById('full_name').value,
                region: document.getElementById('region').value,
                locality_code: document.getElementById('locality_code').value,
                age: document.getElementById('age').value,
                diagnosis_date: document.getElementById('diagnosis_date').value,
                tumor_type: document.getElementById('tumor_type').value,
                tumor_site: document.getElementById('tumor_site').value,
                tumor_behavior: document.getElementById('tumor_behavior').value,
                diagnosis: document.getElementById('diagnosis').value,
                follow_up: document.getElementById('follow_up').value
            }]);

            if (error) {
                alert('حدث خطأ أثناء الحفظ: ' + error.message);
            } else {
                alert('تم حفظ بيانات المريض بنجاح!');
                document.getElementById('patientForm').reset();
            }
            document.getElementById('saveBtn').innerText = "حفظ البيانات في السجل";
        });
    </script>
</body>
</html>
